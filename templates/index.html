<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Interface Clustering + KNN</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 { margin-bottom: 10px; }
        label { display: block; margin-top: 8px; }
        input[type="text"], input[type="number"], input[type="file"] {
            width: 300px;
            padding: 5px;
        }
        .weight-input {
            width: 80px;
        }
        .submit-btn {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 1rem;
        }
        fieldset {
            margin-bottom: 15px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Clustering d’images & Classification KNN</h1>

    <!--
      Attention : l'URL action doit pointer sur la route '/process' (POST),
      pas sur 'index'.
    -->
    <form action="{{ url_for('process') }}" method="post" enctype="multipart/form-data">

        <fieldset>
            <legend><strong>1) Choix des descripteurs et poids</strong></legend>

            <!-- Les checkboxes doivent s'appeler "descriptor" pour getlist('descriptor') -->
            <label>
                <input type="checkbox" name="descriptor" value="color" checked>
                Utiliser Descripteur Couleur
                &nbsp;&nbsp;
                Poids 
                <input type="number" name="weight_color" class="weight-input"
                       value="0.20" step="0.01" min="0" max="1">
            </label>

            <label>
                <input type="checkbox" name="descriptor" value="shape" checked>
                Utiliser Descripteur Forme
                &nbsp;&nbsp;
                Poids 
                <input type="number" name="weight_shape" class="weight-input"
                       value="0.15" step="0.01" min="0" max="1">
            </label>

            <label>
                <input type="checkbox" name="descriptor" value="texture" checked>
                Utiliser Descripteur Texture
                &nbsp;&nbsp;
                Poids 
                <input type="number" name="weight_texture" class="weight-input"
                       value="0.20" step="0.01" min="0" max="1">
            </label>

            <label>
                <input type="checkbox" name="descriptor" value="vgg" checked>
                Utiliser Descripteur VGG19
                &nbsp;&nbsp;
                Poids 
                <input type="number" name="weight_vgg" class="weight-input"
                       value="0.45" step="0.01" min="0" max="1">
            </label>
        </fieldset>

        <fieldset>
            <legend><strong>2) Hyperparamètres KMeans & KNN</strong></legend>
            <label>
                Nombre de clusters (k pour KMeans) :
                <!-- doit être "k_clusters" pour correspondre à app.py -->
                <input type="number" name="k_clusters" value="9" min="2" max="20" step="1">
            </label>
            <label>
                Nombre de voisins similaires (KNN) :
                <!-- "n_neighbors" : correct dans app.py -->
                <input type="number" name="n_neighbors" value="11" min="1" max="20" step="1">
            </label>
        </fieldset>

        <fieldset>
            <legend><strong>3) Dossier images et image requête</strong></legend>
            <label>
                Chemin complet du dossier contenant les images (sur le serveur) :
                <!-- doit être "img_dir" pour correspondre à app.py -->
                <input type="text" name="img_dir" placeholder="Ex : C:\Images\training_set" required>
            </label>
            <label>
                Image requête (upload depuis votre poste) :
                <!-- "query_image" correspond à app.py -->
                <input type="file" name="query_image" accept="image/*" required>
            </label>
        </fieldset>

        <button type="submit" class="submit-btn">Lancer le traitement</button>
    </form>
</body>
</html>
